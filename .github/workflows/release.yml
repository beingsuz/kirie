name: Release
# Produces a fully-populated DRAFT release with ONE portable Linux binary that
# runs on any modern distro, which you just review and Publish.
#
# GitHub emits no event when a draft release is saved, so you can't trigger off
# drafting. Kick this off from the Actions tab:
#   Actions -> Release -> Run workflow  (optionally type a version; blank = auto)
# It then:
#   1. picks the version (your input, or next SemVer from Conventional Commits),
#   2. generates the changelog,
#   3. builds the portable `kirie` binary (`--features portable`: ffmpeg + shaderc
#      statically linked from source) on an old glibc (debian:11, 2.31) so the
#      only dynamic deps are universal system sonames — it runs on Arch, Ubuntu,
#      Fedora, … with no bundling,
#   4. creates the DRAFT release with the binary + changelog attached in one shot.
# You then hit Publish. (Web backends aren't shipped here yet — they link system
# CEF/webkit which isn't portable; build those per-distro if needed.)
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag, e.g. v0.2.0. Blank = auto-detect from Conventional Commits."
        required: false
        default: ""

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # 1. Version + changelog. Publishes RELEASE_NOTES.md as an artifact for the
  #    release job (which runs on a clean image without git history).
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff
      - name: Compute version
        id: version
        run: |
          set -euo pipefail
          input="${{ inputs.version }}"
          if [ -n "$input" ]; then
            version="$input"; case "$version" in v*) ;; *) version="v$version" ;; esac
          else
            raw="$(git cliff --bumped-version 2>/dev/null || true)"
            ver="${raw#v}"; if [ -z "$ver" ] || [ "$ver" = "0.0.0" ]; then ver="0.1.0"; fi
            version="v$ver"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Release version: $version"
      - name: Generate changelog
        run: git cliff --unreleased --tag "${{ steps.version.outputs.version }}" --strip all -o RELEASE_NOTES.md
      - name: Upload changelog
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md
          if-no-files-found: error

  # 2. Build the portable binary on old glibc. ffmpeg + shaderc are compiled from
  #    source and statically linked (the `portable` feature), so the binary keeps
  #    only universal dynamic deps (glibc, libasound.so.2, libpulse.so.0,
  #    libxcb.so.1, libstdc++, libgcc). Vulkan/Wayland/X11 are dlopen'd at runtime.
  build:
    needs: prepare
    runs-on: ubuntu-latest
    container: debian:11
    steps:
      # Toolchain + build deps for the from-source static libs (nasm for ffmpeg;
      # cmake/ninja/git/python for shaderc) and the -dev packages for the libs
      # that stay dynamic. No ffmpeg/shaderc packages — those come from source.
      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential clang ninja-build nasm git curl ca-certificates \
            pkg-config python3 python3-pip \
            libasound2-dev libpulse-dev \
            libxcb1-dev libwayland-dev libxkbcommon-dev libx11-dev libdbus-1-dev
          # debian:11 ships cmake 3.18, but shaderc's SPIRV-Tools needs >=3.22.1.
          # Install a modern cmake from pip (pinned <4 so glslang/SPIRV-Tools'
          # older cmake_minimum_required policies still apply). Keeps debian:11's
          # old glibc (2.31) as the portability floor.
          pip3 install "cmake<4"
          cmake --version
      - name: Install Rust (rustup, current stable)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: actions/checkout@v4
      - name: Set crate version
        run: |
          v="${{ needs.prepare.outputs.version }}"; v="${v#v}"
          sed -i -E "0,/^version = \"[0-9]+\.[0-9]+\.[0-9]+\"/s//version = \"$v\"/" Cargo.toml
      - name: Build portable release
        run: cargo build --release -p kirie --features portable
      # Guard: fail if any version-specific soname slipped back into the binary.
      - name: Verify portability (no churny sonames)
        run: |
          set -euo pipefail
          apt-get install -y --no-install-recommends binutils >/dev/null
          needed="$(readelf -d target/release/kirie | grep NEEDED || true)"
          echo "$needed"
          if echo "$needed" | grep -iqE 'libav|libsw|shaderc|glslang'; then
            echo "::error::churny soname present — not portable"; exit 1
          fi
          echo "portable: only universal sonames"
      - name: Package
        id: package
        run: |
          set -euo pipefail
          install -Dm755 target/release/kirie "dist/kirie"
          cp README.md LICENSE dist/ 2>/dev/null || true
          tar -C dist -czf kirie-linux-x86_64.tar.gz .
          echo "tarball=kirie-linux-x86_64.tar.gz" >> "$GITHUB_OUTPUT"
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: kirie-linux-x86_64
          path: ${{ steps.package.outputs.tarball }}
          if-no-files-found: error

  # 3. Create the DRAFT release once, with the binary + notes attached in a single
  #    `gh release create` (no fragile create-then-upload-by-tag lookup).
  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      V: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-notes
      - uses: actions/download-artifact@v4
        with:
          name: kirie-linux-x86_64
      - name: Create draft release with assets
        run: |
          set -euo pipefail
          # Replace any existing release/draft for this version, then create fresh
          # with the asset + notes attached in one call.
          gh release delete "$V" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$V" --draft --title "$V" \
            --notes-file RELEASE_NOTES.md \
            kirie-linux-x86_64.tar.gz
          echo "Draft $V created with the portable binary attached."
