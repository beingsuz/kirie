name: Release
# Produces a fully-populated DRAFT release you review and Publish. Kick off from
# Actions -> Release -> Run workflow (optionally type a version; blank = auto).
# It computes the version + changelog, gates on the full test suite, builds the
# artifacts, and creates the draft with all of them + notes attached in one shot.
#
# Artifacts: three STANDALONE executables, no tarballs (chmod +x after
# download; all with ffmpeg + shaderc statically linked via `--features portable`):
#   kirie              - portable single binary. Only universal dynamic deps
#                        (glibc, alsa, pulse, xcb); runs on any distro (glibc>=2.31).
#   kirie-web-cef      - SINGLE self-extracting file with bundled Chromium: the
#                        engine + the whole CEF runtime (libcef.so, resources,
#                        locales) + the kirie-webhost browser process + the CEF
#                        subprocess helper, stripped, compressed and appended
#                        behind a launcher stub. One executable, no runtime dir,
#                        no system browser; self-extracts to cache on first run.
#                        The ENGINE binary links no libcef - the browser runs
#                        out-of-process in kirie-webhost.
#   kirie-web-webview  - + wry/system webkit2gtk-4.1. Smaller, but REQUIRES the
#                        target to have webkit2gtk-4.1 + libsoup-3.0 installed
#                        (webkit can't be bundled). Built on glibc 2.35.
#                        NOTE: webkit2gtk has NO offscreen-rendering path
#                        (upstream won't-fix), so web wallpapers cannot
#                        composite in this variant - it is scenes/video only.
#                        Prefer kirie-web-cef for working web wallpapers.
#
# No Windows artifacts: kirie's presentation layer is Linux-native (Wayland
# wlr-layer-shell + X11 fallback, PulseAudio, memfd) - on Windows the original
# Wallpaper Engine is the native app. A Windows port would be a new platform
# backend, not a packaging change.
#
# Job shape: default + web-cef build IN ONE JOB on a local org runner (the
# focal-based runner image IS the glibc 2.31 floor debian:11 used to provide;
# the runners have no docker, so containers are out anyway). Same target dir -
# the web build reuses the whole dependency graph incl. the from-source static
# ffmpeg/shaderc, so they compile once, not twice. The webview variant runs on
# the jammy runner pool (webkit2gtk-4.1, glibc 2.35). Shared setup + the
# cargo/target cache live in .github/actions/release-setup; a glibc-floor
# guard fails the build if the runner image ever drifts.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag, e.g. v0.2.0. Blank = auto-detect from Conventional Commits."
        required: false
        default: ""

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # 1. Version + changelog; publish RELEASE_NOTES.md as an artifact.
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff
      - name: Compute version
        id: version
        run: |
          set -euo pipefail
          input="${{ inputs.version }}"
          if [ -n "$input" ]; then
            version="$input"; case "$version" in v*) ;; *) version="v$version" ;; esac
          else
            raw="$(git cliff --bumped-version 2>/dev/null || true)"
            ver="${raw#v}"; if [ -z "$ver" ] || [ "$ver" = "0.0.0" ]; then ver="0.1.0"; fi
            version="v$ver"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Release version: $version"
      - name: Generate changelog
        run: git cliff --unreleased --tag "${{ steps.version.outputs.version }}" --strip all -o RELEASE_NOTES.md
      - name: Upload changelog
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: RELEASE_NOTES.md
          if-no-files-found: error

  # 1b. Test gate: no artifact ships from a tree with failing tests. This is
  #     the full `cargo test --workspace` (per-commit CI is lint-only).
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang libclang-dev cmake ninja-build pkg-config \
            libavcodec-dev libavformat-dev libavutil-dev libavdevice-dev \
            libavfilter-dev libswscale-dev libswresample-dev \
            libasound2-dev libpulse-dev \
            libwayland-dev libxkbcommon-dev libxcb1-dev \
            libshaderc-dev glslang-dev
      - run: cargo test --workspace

  # 2. default + web-cef in one focal-runner job (glibc 2.31 floor). The default
  #    build compiles the full portable dependency graph (static ffmpeg +
  #    shaderc); the web-cef build on top only adds the web crates + the two
  #    CEF-linked binaries. Both artifacts upload from here.
  build-linux:
    needs: [prepare, test]
    # Local org runner, focal-based image = glibc 2.31 - the same portability
    # floor debian:11 gave us, without a container (the runners have no
    # docker). 5.5 cores + local disk vs the 2-core hosted VM.
    runs-on: [self-hosted, glibc231-focal]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/release-setup
        with:
          cache-key: release-focal

      - name: Set crate version
        run: |
          v="${{ needs.prepare.outputs.version }}"; v="${v#v}"
          sed -i -E "0,/^version = \"[0-9]+\.[0-9]+\.[0-9]+\"/s//version = \"$v\"/" Cargo.toml

      - name: Build default (portable)
        run: cargo build --release -p kirie --features portable

      # Guard: ffmpeg + shaderc must be static; the engine must never link
      # libcef (the browser stays out-of-process in kirie-webhost).
      - name: Verify static deps + no libcef in the engine
        run: |
          set -euo pipefail
          needed="$(readelf -d target/release/kirie | grep NEEDED || true)"
          echo "$needed"
          if echo "$needed" | grep -iqE 'libav|libsw|shaderc|glslang'; then
            echo "::error::churny soname present — ffmpeg/shaderc not static"; exit 1
          fi
          if echo "$needed" | grep -iq 'libcef'; then
            echo "::error::engine links libcef — the browser must stay out-of-process (kirie-webhost)"; exit 1
          fi
          echo "ok: ffmpeg + shaderc static; no libcef in the engine"
          # The glibc floor now comes from the runner image (focal) - fail loudly
          # if the image ever moves and silently raises the floor.
          floor=$(objdump -T target/release/kirie | grep -o 'GLIBC_[0-9.]*' | sort -Vu | tail -1)
          echo "glibc floor: $floor"
          case "$floor" in GLIBC_2.3[01]|GLIBC_2.[0-9]|GLIBC_2.[12][0-9]) ;; *)
            echo "::error::glibc floor rose to $floor (runner image drift?) - portable promise is >=2.31"; exit 1;;
          esac

      - name: Stage default binary
        run: cp target/release/kirie kirie-linux-x86_64

      - name: Build web-cef (engine + helper + webhost)
        run: |
          cargo build --release -p kirie --features portable,web-cef
          cargo build --release -p kirie-web --features cef --bin kirie-cef-helper
          cargo build --release -p kirie-web --features cef --bin kirie-webhost
          cargo build --release -p kirie-launcher

      - name: Package web-cef single file
        run: |
          set -euo pipefail
          ./target/release/kirie-pack target/release kirie-web-cef-linux-x86_64
          chmod +x kirie-web-cef-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: kirie-linux-x86_64
          path: kirie-linux-x86_64
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: kirie-web-cef-linux-x86_64
          path: kirie-web-cef-linux-x86_64
          if-no-files-found: error

  # 3. webview variant: ubuntu:22.04 ships webkit2gtk-4.1 (debian:11 only 4.0).
  build-webview:
    needs: [prepare, test]
    # Local org runner, jammy-based image (22.04): webkit2gtk-4.1 + the same
    # glibc 2.35 floor the ubuntu:22.04 container had.
    runs-on: [self-hosted, pipewire-jammy]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/release-setup
        with:
          cache-key: release-jammy
          extra-apt: libwebkit2gtk-4.1-dev libsoup-3.0-dev

      - name: Set crate version
        run: |
          v="${{ needs.prepare.outputs.version }}"; v="${v#v}"
          sed -i -E "0,/^version = \"[0-9]+\.[0-9]+\.[0-9]+\"/s//version = \"$v\"/" Cargo.toml

      - name: Build web-webview (portable)
        run: cargo build --release -p kirie --features portable,web-webview

      - name: Verify static deps
        run: |
          set -euo pipefail
          needed="$(readelf -d target/release/kirie | grep NEEDED || true)"
          echo "$needed"
          if echo "$needed" | grep -iqE 'libav|libsw|shaderc|glslang'; then
            echo "::error::churny soname present — ffmpeg/shaderc not static"; exit 1
          fi
          echo "ok: ffmpeg + shaderc statically linked"

      - name: Stage webview binary
        run: cp target/release/kirie kirie-web-webview-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: kirie-web-webview-linux-x86_64
          path: kirie-web-webview-linux-x86_64
          if-no-files-found: error

  # 4. Create/update the draft release once, with all built artifacts + notes.
  release:
    needs: [prepare, build-linux, build-webview]
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      GH_REPO: ${{ github.repository }}
      V: ${{ needs.prepare.outputs.version }}
    steps:
      - name: Download changelog
        uses: actions/download-artifact@v4
        with:
          name: release-notes
      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "*-linux-x86_64"
          merge-multiple: true
      - name: Create or update the draft release
        run: |
          set -euo pipefail
          # Three standalone executables (no archives): kirie, kirie-web-cef
          # (self-extracting), kirie-web-webview.
          files=$(ls *-linux-x86_64*)
          cat >> RELEASE_NOTES.md <<'EOF'

          ## Downloads

          All assets are standalone executables — download, `chmod +x`, run.

          | File | Variant |
          | --- | --- |
          | `kirie-linux-x86_64` | scenes + video + images |
          | `kirie-web-cef-linux-x86_64` | + web wallpapers, bundled Chromium (self-extracting, no system deps) |
          | `kirie-web-webview-linux-x86_64` | + system webkit2gtk — needs `libwebkit2gtk-4.1` + `libsoup-3.0` installed; webkit has no offscreen path (upstream won't-fix), so web wallpapers do NOT composite: scenes/video/images only. Prefer the cef build for web. |
          EOF
          echo "attaching:"; echo "$files"
          # No checkout here, so gh must stay API-only: GH_REPO gives the repo and
          # --target gives create an explicit commit. Update in place if it exists.
          if gh release view "$V" >/dev/null 2>&1; then
            echo "release $V exists — updating in place (not deleting)"
            gh release edit "$V" --draft --title "$V" --notes-file RELEASE_NOTES.md
            gh release upload "$V" $files --clobber
          else
            echo "creating draft $V"
            gh release create "$V" --draft --title "$V" --target "$GITHUB_SHA" \
              --notes-file RELEASE_NOTES.md $files
          fi
          echo "Draft $V ready with all artifacts attached."
